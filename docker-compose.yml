version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dompetku-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dompetku
      POSTGRES_PASSWORD: dompetku_secret
      POSTGRES_DB: dompetku
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
